<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#312e81;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Cosmic Circle -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#blueGradient)" stroke-width="2" opacity="0.3"/>
  <circle cx="100" cy="100" r="75" fill="none" stroke="url(#goldGradient)" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Crescent Moon -->
  <path d="M 100 40 Q 85 60 85 80 Q 85 100 100 120 Q 90 115 85 100 Q 80 85 85 70 Q 90 55 100 40 Z" 
        fill="url(#goldGradient)" opacity="0.9"/>
  
  <!-- Trishul (Trident) -->
  <g transform="translate(100, 100)">
    <!-- Center prong -->
    <path d="M 0 -30 L 0 50" stroke="url(#goldGradient)" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Left prong -->
    <path d="M -15 -25 L -15 -10 Q -15 0 -7 5" stroke="url(#goldGradient)" stroke-width="3" stroke-linecap="round" fill="none"/>
    
    <!-- Right prong -->
    <path d="M 15 -25 L 15 -10 Q 15 0 7 5" stroke="url(#goldGradient)" stroke-width="3" stroke-linecap="round" fill="none"/>
    
    <!-- Trishul tips -->
    <circle cx="0" cy="-30" r="3" fill="url(#goldGradient)"/>
    <circle cx="-15" cy="-25" r="2.5" fill="url(#goldGradient)"/>
    <circle cx="15" cy="-25" r="2.5" fill="url(#goldGradient)"/>
    
    <!-- Base ornament -->
    <circle cx="0" cy="50" r="5" fill="url(#blueGradient)"/>
    <path d="M -8 50 L 8 50" stroke="url(#goldGradient)" stroke-width="2"/>
  </g>
  
  <!-- Cosmic energy particles -->
  <circle cx="60" cy="60" r="2" fill="url(#goldGradient)" opacity="0.6"/>
  <circle cx="140" cy="70" r="1.5" fill="url(#goldGradient)" opacity="0.5"/>
  <circle cx="150" cy="130" r="2" fill="url(#goldGradient)" opacity="0.6"/>
  <circle cx="50" cy="140" r="1.5" fill="url(#goldGradient)" opacity="0.5"/>
  
  <!-- Outer cosmic ring -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#goldGradient)" stroke-width="0.5" opacity="0.3" stroke-dasharray="5,5"/>
</svg>
