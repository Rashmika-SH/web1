<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - MASTER SADASHIVA</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #000000 0%, #1a0000 25%, #330000 50%, #4d0000 75%, #660000 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        
        .thank-you-container {
            text-align: center;
            max-width: 600px;
            padding: 60px 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 2px solid #ff8c00;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .success-icon {
            font-size: 4rem;
            margin-bottom: 24px;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            60% { transform: translateY(-10px); }
        }
        
        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            color: #ff8c00;
            margin-bottom: 20px;
        }
        
        p {
            font-size: 1.125rem;
            line-height: 1.6;
            margin-bottom: 16px;
            color: rgba(255, 255, 255, 0.9);
        }
        
        .contact-info {
            margin-top: 32px;
            padding: 24px;
            background: rgba(255, 140, 0, 0.1);
            border-radius: 12px;
            border: 1px solid rgba(255, 140, 0, 0.3);
        }
        
        .btn {
            display: inline-block;
            padding: 16px 32px;
            background: linear-gradient(135deg, #dc143c 0%, #ff4500 50%, #ff8c00 100%);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            margin-top: 24px;
            transition: transform 0.3s ease;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        @media (max-width: 768px) {
            .thank-you-container {
                margin: 20px;
                padding: 40px 24px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="thank-you-container">
        <div class="success-icon">🙏</div>
        <h1>Thank You!</h1>
        <p>Your consultation request has been successfully submitted.</p>
        <p>We have received your details and will get back to you within 24 hours via email or phone.</p>
        
        <div class="contact-info">
            <p><strong>For urgent matters, you can reach us directly:</strong></p>
            <p>📞 Phone: +1 (630) 666-9744</p>
            <p>📧 Email: info@mastersadashiva.com</p>
        </div>
        
        <a href="index.html" class="btn">Return to Home</a>
    </div>
</body>
</html>
